<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hệ Thống Quản Lý Đối Soát</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-wrap">
      <nav
        style="
          background: white;
          border-bottom: 1px solid var(--border-color);
          padding: 15px 0;
        "
      >
        <div
          class="container"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <div
            style="
              font-size: 1.3rem;
              font-weight: bold;
              color: var(--primary-color);
            "
          >
            <i class="fas fa-building"></i> Nền Tảng Quản Lý Đối Soát
          </div>
          <div style="display: flex; gap: 15px">
            <a href="login.html" class="btn btn-outline" style="width: auto"
              ><i class="fas fa-user"></i> Cổng Khách Thuê</a
            >

            <a
              href="partner.html"
              class="btn btn-primary"
              style="width: auto; background: #d97706"
              ><i class="fas fa-handshake"></i> Trở thành Đối tác</a
            >

            <a
              href="super-admin.html"
              style="font-size: 0.8rem; color: #cbd5e1; align-self: center"
              title="Hệ thống Quản trị Lõi"
              >System</a
            >
          </div>
        </div>
      </nav>

      <div class="container" style="padding: 40px 20px">
        <div style="text-align: center; margin-bottom: 40px">
          <h1
            style="
              color: var(--text-main);
              font-size: 2rem;
              margin-bottom: 10px;
            "
          >
            Quản Lý Thông Tin & Thanh Toán
          </h1>
          <p style="color: var(--text-muted); font-size: 1.1rem">
            Hệ thống quản lý đối soát Chung Cư & Xóm Trọ
          </p>
        </div>

        <div
          style="max-width: 600px; margin: 0 auto 40px auto; position: relative"
        >
          <input
            type="text"
            id="searchInput"
            placeholder="Nhập tên xóm trọ, chung cư hoặc khu vực..."
            style="
              padding-left: 45px;
              border-radius: 30px;
              font-size: 1.1rem;
              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
              border: 1px solid #cbd5e1;
            "
          />
          <i
            class="fas fa-search"
            style="
              position: absolute;
              left: 18px;
              top: 15px;
              color: var(--text-muted);
              font-size: 1.2rem;
            "
          ></i>
        </div>

        <div
          id="public-buildings-list"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
          "
        >
          <div
            style="
              text-align: center;
              grid-column: 1 / -1;
              color: var(--text-muted);
            "
          >
            Đang tải danh sách các khu trọ và chung cư...
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        collection,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      document.addEventListener("DOMContentLoaded", async () => {
        const snap = await getDocs(collection(db, "building_profiles"));
        const listContainer = document.getElementById("public-buildings-list");

        if (snap.empty) {
          listContainer.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: #ef4444;">Hiện chưa có đối tác nào đăng thông tin.</div>`;
          return;
        }

        listContainer.innerHTML = "";
        let hasActive = false;

        snap.forEach((docSnap) => {
          const item = docSnap.data();
          if (item.status !== "active") return; // LỌC CHẶN RÁC Ở ĐÂY

          hasActive = true;
          const defaultImg =
            "https://via.placeholder.com/400x200?text=Chua+co+anh";
          const typeLabel =
            item.type === "motel"
              ? '<span class="badge" style="background:#d1fae5; color:#10b981;">Xóm Trọ</span>'
              : '<span class="badge" style="background:#e0e7ff; color:#3730a3;">Chung Cư</span>';

          listContainer.innerHTML += `
            <div class="card building-item" style="padding: 0; overflow: hidden;">
                <img src="${item.imageUrl || defaultImg}" style="width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #e2e8f0;">
                <div style="padding: 20px;">
                    <h3 class="building-name" style="margin-bottom: 10px; color: var(--text-main); font-size: 1.2rem;">${item.name}</h3>
                    <div style="margin-bottom: 15px;">${typeLabel}</div>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 8px;"><i class="fas fa-map-marker-alt" style="width: 20px; color: #ef4444;"></i> ${item.address}</p>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 8px;"><i class="fas fa-phone-alt" style="width: 20px; color: #10b981;"></i> ${item.phone}</p>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1;">${item.description}</p>
                </div>
            </div>`;
        });

        if (!hasActive) {
          listContainer.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: #ef4444;">Hệ thống đang cập nhật dữ liệu.</div>`;
        }

        // Tính năng tìm kiếm động
        document
          .getElementById("searchInput")
          .addEventListener("keyup", function () {
            let filter = this.value.toLowerCase();
            let items = document.getElementsByClassName("building-item");
            for (let i = 0; i < items.length; i++) {
              let name = items[i]
                .getElementsByClassName("building-name")[0]
                .innerText.toLowerCase();
              items[i].style.display = name.includes(filter) ? "" : "none";
            }
          });
      });
    </script>
  </body>
</html>
