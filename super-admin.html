<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Super Admin-Chủ Nền Tảng</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <i class="fas fa-crown"></i> SUPER ADMIN
        </div>
        <ul class="nav-menu">
          <li class="active">
            <a href="#"><i class="fas fa-users-cog"></i> Phê duyệt Đối tác</a>
          </li>
        </ul>
      </aside>
      <main class="main-content">
        <header class="topbar">
          <h2>Quản trị Lõi Hệ Thống</h2>
          <div style="display: flex; gap: 15px; align-items: center">
            <span
              id="admin-name"
              style="font-weight: bold; color: var(--primary-color)"
              >Đang tải...</span
            >
            <button
              class="btn btn-outline logout-btn"
              style="width: auto; padding: 5px 15px"
            >
              Đăng xuất
            </button>
          </div>
        </header>
        <div class="container" style="padding-top: 30px">
          <div class="card" style="border-top: 4px solid #8b5cf6">
            <h3 style="margin-bottom: 20px; color: #8b5cf6">
              <i class="fas fa-list"></i> Danh sách Đối tác cần duyệt
            </h3>
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th>Loại Tài Khoản</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                  </tr>
                </thead>
                <tbody id="users-tbody">
                  <tr>
                    <td colspan="4" style="text-align: center">
                      Đang tải dữ liệu...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module">
      import { auth, db } from "./js/firebase.js";
      import {
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
      import {
        doc,
        getDoc,
        collection,
        getDocs,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      // CHỐT CHẶN BẢO VỆ TẬN GỐC
      onAuthStateChanged(auth, async (user) => {
        if (!user) return (window.location.href = "login.html");

        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();

          if (data.role !== "super_admin" || data.status !== "active") {
            alert("Cảnh báo: Bạn không có quyền truy cập hệ thống Lõi!");
            window.location.href = "login.html";
            return;
          }

          // Vượt qua ải bảo vệ
          document.getElementById("admin-name").innerText =
            "Sếp: " + (data.name || "Admin");
          loadUsers();
        } else {
          alert("Dữ liệu người dùng không tồn tại (Lệch UID)!");
          window.location.href = "login.html";
        }
      });

      document
        .querySelector(".logout-btn")
        .addEventListener("click", () => signOut(auth));

      // Hàm tải danh sách
      async function loadUsers() {
        const snap = await getDocs(collection(db, "users"));
        const tbody = document.getElementById("users-tbody");
        tbody.innerHTML = "";
        let count = 0;

        snap.forEach((docSnap) => {
          const item = docSnap.data();
          if (item.role === "super_admin") return;

          count++;
          let roleName =
            item.role === "admin_motel"
              ? "Chủ Xóm Trọ"
              : item.role === "admin_apartment"
                ? "BQL Chung Cư"
                : "Khách Thuê";
          const statusBadge =
            item.status === "active"
              ? '<span class="badge" style="background:#d1fae5;color:#10b981;">Đã cấp quyền</span>'
              : '<span class="badge" style="background:#fef3c7;color:#d97706;">Đang chờ duyệt</span>';

          const btn =
            item.status === "active"
              ? `<button class="btn btn-outline" disabled style="width: auto; padding: 4px 10px;">Đã duyệt</button>`
              : `<button class="btn btn-primary btn-duyet" data-id="${docSnap.id}" style="width: auto; padding: 4px 10px; background: #8b5cf6;">Duyệt ngay</button>`;

          tbody.innerHTML += `<tr>
                    <td><strong>${item.email}</strong></td>
                    <td><strong style="color: var(--primary-color);">${roleName}</strong></td>
                    <td>${statusBadge}</td>
                    <td>${btn}</td>
                </tr>`;
        });

        if (count === 0)
          tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Chưa có Đối tác nào đăng ký.</td></tr>`;

        document.querySelectorAll(".btn-duyet").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const uid = e.target.getAttribute("data-id");
            btn.innerText = "Đang xử lý...";
            await updateDoc(doc(db, "users", uid), { status: "active" });
            alert("Đã cấp quyền!");
            loadUsers();
          });
        });
      }
    </script>
  </body>
</html>
